name: Build and Push Docker Image to ghcr.io

on:
  workflow_call:
    inputs:
      dockerfile:
        required: true
        type: string
      imagename:
        required: true
        type: string
      platforms:
        required: true
        type: string
      eventname:
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
        # Publish to ghcr.io only. Limit platforms to amd64 for pull requests.
      - name: Set variables
        run: |
          if [[ ${{ inputs.eventname }} == 'pull_request' ]]; then
            echo "PLATFORMS=linux/amd64" >> $GITHUB_ENV
          else
            echo "PLATFORMS=${{ inputs.platforms }}" >> $GITHUB_ENV
          fi
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      # Add tags to metadata
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: "ghcr.io/${{ inputs.imagename }}"
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
      - name: Log into ghcr.io registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ inputs.dockerfile }}
          platforms: ${{ env.PLATFORMS }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          push: ${{ inputs.eventname != 'pull_request' }}
          pull: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
